<!DOCTYPE html>
<html lang="es">
<head>

<body class="bg-light">

                        </div>
                        
                        <h2 class="h6 text-secondary text-uppercase fw-bold mb-3">Elementos Registrados:</h2>
                        
                        <ul id="lista" class="list-group">

                </div> </div>
