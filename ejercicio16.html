<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Funciones Flecha</title>

    <link rel="stylesheet" href="css/ejercicio16.css">

    <script src="js/ejercicio16.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="contenedor-calculadora">

    <h1>Calculadora Básica</h1>

    <p class="subtitulo">
        Realiza operaciones utilizando funciones flecha.
    </p>

    <div class="formulario">

        <div class="grupo-campo">
            <label for="numero1">Primer número</label>
            <input type="text" id="numero1" placeholder="Ejemplo: 10">
        </div>

        <div class="grupo-campo">
            <label for="numero2">Segundo número</label>
            <input type="text" id="numero2" placeholder="Ejemplo: 5">
        </div>

        <button class="boton-convertir" onclick="calcularOperacion('sumar')">
            Sumar
        </button>

        <button class="boton-convertir" onclick="calcularOperacion('restar')">
            Restar
        </button>

        <button class="boton-convertir" onclick="calcularOperacion('multiplicar')">
            Multiplicar
        </button>

        <button class="boton-convertir" onclick="calcularOperacion('dividir')">
            Dividir
        </button>

        <div class="grupo-campo">
            <label for="resultado">Resultado</label>
            <input type="text" id="resultado" readonly>
        </div>

    </div>

</div>

</body>
</html>
