<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Pesos a Dólares</title>

    <link rel="stylesheet" href="css/ejercicio12.css">

    <script src="js/ejercicio12.js"></script>

    <!-- Librería para alertas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="contenedor-calculadora">

    <h1>Conversor de Moneda</h1>

    <p class="subtitulo">
        Convierte Pesos Mexicanos (MXN) a Dólares Estadounidenses (USD).
    </p>

    <div class="formulario">

        <div class="grupo-campo">
            <label for="pesos">
                Cantidad en Pesos Mexicanos (MXN):
            </label>

            <input
                type="text"
                id="pesos"
                placeholder="Ejemplo: 500">
        </div>

        <button
            type="button"
            onclick="convertir()"
            class="boton-convertir">

            Convertir

        </button>

        <div class="grupo-campo">

            <label for="dolares">

                Resultado en Dólares (USD):

            </label>

            <input
                type="text"
                id="dolares"
                readonly
                placeholder="Aquí aparecerá el resultado">

        </div>

    </div>

</div>

</body>
</html>
