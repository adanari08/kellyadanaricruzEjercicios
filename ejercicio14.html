<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis de Números</title>

    <link rel="stylesheet" href="css/ejercicio14.css">

    <script src="js/ejercicio14.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<body>

<div class="contenedor-calculadora">

    <h1>Análisis de Números</h1>

    <p class="subtitulo">
        Ingresa varios números separados por comas para obtener el mayor, el menor y el promedio.
    </p>

    <div class="formulario">

        <div class="grupo-campo">
            <label for="numeros">
                Números:
            </label>

            <input
                type="text"
                id="numeros"
                placeholder="Ejemplo: 10,20,30,40,50">
        </div>

        <button
            class="boton-convertir"
            onclick="calcular()">

            Calcular

        </button>

        <div class="grupo-campo">

            <label for="mayor">
                Número mayor:
            </label>

            <input
                type="text"
                id="mayor"
                readonly>

        </div>

        <div class="grupo-campo">

            <label for="menor">
                Número menor:
            </label>

            <input
                type="text"
                id="menor"
                readonly>

        </div>

        <div class="grupo-campo">

            <label for="promedio">
                Promedio:
            </label>

            <input
                type="text"
                id="promedio"
                readonly>

        </div>

    </div>

</div>

</body>
</html>
