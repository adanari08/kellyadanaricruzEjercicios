<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Estudiantes</title>

    <link rel="stylesheet" href="css/ejercicio15.css">

    <script src="js/ejercicio15.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="contenedor-calculadora">

    <h1>Registro de Estudiantes</h1>

    <p class="subtitulo">
        Agrega estudiantes y sus calificaciones para obtener estadísticas.
    </p>

    <div class="formulario">

        <div class="grupo-campo">
            <label for="nombre">Nombre del estudiante</label>
            <input type="text" id="nombre" placeholder="Ejemplo: Juan">
        </div>

        <div class="grupo-campo">
            <label for="calificacion">Calificación</label>
            <input type="text" id="calificacion" placeholder="Ejemplo: 85">
        </div>

        <button
            class="boton-convertir"
            onclick="agregarEstudiante()">

            Agregar estudiante

        </button>

        <button
            class="boton-convertir"
            onclick="calcularResultados()">

            Calcular

        </button>

        <div class="grupo-campo">
            <label>Promedio</label>
            <input type="text" id="promedio" readonly>
        </div>

        <div class="grupo-campo">
            <label>Calificación más alta</label>
            <input type="text" id="mayor" readonly>
        </div>

        <div class="grupo-campo">
            <label>Calificación más baja</label>
            <input type="text" id="menor" readonly>
        </div>

    </div>

</div>

</body>
</html>
